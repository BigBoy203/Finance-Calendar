<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4FA3E8"/>
      <stop offset="1" stop-color="#2E6FB8"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#F4B942"/>
    </linearGradient>
  </defs>

  <!-- calendar body -->
  <rect x="24" y="40" width="208" height="184" rx="28" fill="url(#bodyGrad)"/>

  <!-- header strip -->
  <path d="M24 68 a28 28 0 0 1 28-28 h152 a28 28 0 0 1 28 28 v20 H24 Z" fill="#1F4E84"/>

  <!-- binder rings -->
  <rect x="64" y="20" width="18" height="44" rx="9" fill="#1F4E84"/>
  <rect x="174" y="20" width="18" height="44" rx="9" fill="#1F4E84"/>

  <!-- grid dots representing days -->
  <g fill="#EAF4FF" opacity="0.85">
    <circle cx="62"  cy="118" r="9"/>
    <circle cx="98"  cy="118" r="9"/>
    <circle cx="134" cy="118" r="9"/>
    <circle cx="170" cy="118" r="9"/>
    <circle cx="62"  cy="154" r="9"/>
    <circle cx="98"  cy="154" r="9"/>
    <circle cx="170" cy="154" r="9"/>
    <circle cx="62"  cy="190" r="9"/>
  </g>

  <!-- coin with dollar sign, replacing one date and overlapping the grid -->
  <circle cx="160" cy="180" r="40" fill="url(#coinGrad)" stroke="#C98A1F" stroke-width="4"/>
  <text x="160" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700"
        text-anchor="middle" fill="#8A5A12">$</text>
</svg>
